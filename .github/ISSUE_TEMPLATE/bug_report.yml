name: Bug report
description: Report a reproducible bug in MYmd
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this issue on the latest release.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: A short and clear bug summary.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide deterministic steps.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: v1.2.2
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs and attach screenshots if available.
      render: shell
