name: Feature request
description: Suggest an improvement for MYmd
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: Describe the workflow pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should MYmd do?
      placeholder: Describe expected behavior and UX.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other options you considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor UX
        - File workflow
        - Search / Replace
        - Tauri integration
        - Settings / Theme
        - Performance
        - Documentation
        - Other
