name: Release From Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}([-.].+)?$ ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Collect release artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $version = "${{ steps.release_tag.outputs.version }}"
          $setup = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*_x64-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "NSIS setup artifact not found." }
          Copy-Item -Force $setup.FullName "release/$($setup.Name)"
          Copy-Item -Force "src-tauri/target/release/app.exe" "release/MYmd_${version}_x64.exe"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          files: |
            release/*_x64-setup.exe
            release/MYmd_*_x64.exe
          generate_release_notes: true
