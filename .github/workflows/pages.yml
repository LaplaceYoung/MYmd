name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pages Is Enabled
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.repos.getPages({ owner, repo });
              core.info("GitHub Pages already enabled.");
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info("GitHub Pages is not enabled. Creating Pages site with workflow build type.");
              await github.request("POST /repos/{owner}/{repo}/pages", {
                owner,
                repo,
                build_type: "workflow"
              });
            }

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
